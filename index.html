<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORKOUT PLAN RF 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: -apple-system, sans-serif; padding-bottom: 80px; }
        .card { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .set-btn { background: #334155; padding: 12px; border-radius: 8px; flex: 1; text-align: center; font-weight: bold; font-size: 13px; border: 1px solid #475569; }
        .set-active { background: #10b981 !important; border-color: white; }
        .day-content { display: none; }
        .day-active { display: block; }
        .nav-btn { background: #1e293b; color: #94a3b8; padding: 10px 18px; border-radius: 20px; font-size: 12px; font-weight: bold; white-space: nowrap; }
        .nav-active { background: #3b82f6; color: white; }
        .cat-title { color: #60a5fa; font-size: 12px; font-weight: bold; letter-spacing: 2px; margin: 25px 0 10px 0; border-bottom: 1px solid #334155; padding-bottom: 5px; text-transform: uppercase; }
        #restTimerDisplay { position: fixed; bottom: 20px; right: 20px; background: #3b82f6; width: 80px; height: 80px; border-radius: 50%; display: none; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; border: 3px solid white; box-shadow: 0 5px 20px rgba(0,0,0,0.6); z-index: 999; }
        .rest-active { display: flex !important; }
        .weight-input { background: #0f172a; border: 1px solid #3b82f6; border-radius: 5px; color: #60a5fa; width: 65px; padding: 2px 5px; text-align: center; font-weight: bold; outline: none; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-black text-blue-400">WORKOUT PLAN RF 2026</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">AUTO CHECK-IN ACTIVO</p>
        </div>
        <button id="sessionBtn" onclick="toggleSession()" class="bg-blue-600 px-4 py-2 rounded-lg font-bold text-xs uppercase">Check-in</button>
    </div>

    <div id="sessionTimer" class="text-center text-blue-300 font-mono text-2xl mb-6 bg-slate-800/50 py-2 rounded-lg hidden">00:00:00</div>

    <div class="flex space-x-2 overflow-x-auto mb-6 pb-2">
        <button id="btn1" onclick="showDay(1)" class="nav-btn nav-active">D1: PIERNA</button>
        <button id="btn2" onclick="showDay(2)" class="nav-btn">D2: Hombro/Espalda/ABS</button>
        <button id="btn3" onclick="showDay(3)" class="nav-btn">D3: Pecho/Bicep/Tricep</button>
        <button id="btn4" onclick="showDay(4)" class="nav-btn">D4: Leg Day</button>
        <button id="btn5" onclick="showDay(5)" class="nav-btn">D5: Hombro/Espalda/ABS</button>
        <button id="btn6" onclick="showDay(6)" class="nav-btn">D6: Pecho/Bicep/Tricep</button>
        <button id="btn7" onclick="showDay(7)" class="nav-btn">D7: RELAX</button>
    </div>

    <template id="pierna-template">
        <div class="cat-title">WARM UP</div>
        <div class="card flex justify-between items-center"><span class="font-bold uppercase">Calentamiento Articular</span><button onclick="handleAction(this)" class="bg-slate-700 px-6 py-2 rounded-full font-bold text-xs">LISTO</button></div>
        <div class="cat-title">PIERNA</div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">1. Sentadilla Smith</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">2. Prensa</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">3. Leg Extension</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="this.classList.toggle('set-active')">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">4. Desplante Mancuerna</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">5. Hip Thrust</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
    </template>

    <template id="hea-template">
        <div class="cat-title">WARM UP</div>
        <div class="card flex justify-between items-center"><span class="font-bold">MOVILIDAD</span><button onclick="handleAction(this)" class="bg-slate-700 px-6 py-2 rounded-full font-bold text-xs">LISTO</button></div>
        <div class="cat-title">ESPALDA & HOMBRO</div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">1. Dominadas</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">2. Jalón al Pecho</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">3. Remo Mancuerna</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">4. Militar Press 90°</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">5. Laterales</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="cat-title">ABS</div>
        <div id="abs-container"></div>
    </template>

    <template id="pbt-template">
        <div class="cat-title">WARM UP</div>
        <div class="card flex justify-between items-center"><span class="font-bold">WARM UP</span><button onclick="handleAction(this)" class="bg-slate-700 px-6 py-2 rounded-full font-bold text-xs">LISTO</button></div>
        <div class="cat-title">PECHO</div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">1. Banco Inclinado</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">2. Banco Plano</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="cat-title">BRAZOS</div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">3. Curl Martillo</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">4. Barra Z</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
        <div class="card"><div class="flex justify-between mb-3"><div><b class="ex-name">5. Extensión Polea</b><br><span class="text-[10px] text-gray-400">PESO: <input type="text" class="weight-input" placeholder="LBS"></span></div><button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button></div><div class="flex gap-2"><div class="set-btn" onclick="handleAction(this)">S1</div><div class="set-btn" onclick="handleAction(this)">S2</div><div class="set-btn" onclick="handleAction(this)">S3</div></div></div>
    </template>

    <div id="day1" class="day-content day-active"></div>
    <div id="day2" class="day-content"></div>
    <div id="day3" class="day-content"></div>
    <div id="day4" class="day-content"></div>
    <div id="day5" class="day-content"></div>
    <div id="day6" class="day-content"></div>
    <div id="day7" class="day-content">
        <div class="flex flex-col items-center justify-center h-64 opacity-50">
            <span class="text-4xl mb-4">🏠</span>
            <p class="font-bold">DÍA DE DESCANSO</p>
            <p class="text-xs">Recupera y come bien.</p>
        </div>
    </div>

    <div id="restTimerDisplay" onclick="this.classList.remove('rest-active')">
        <span class="text-[10px]">REPOSO</span>
        <span id="tDisplay" class="text-xl">02:00</span>
    </div>

    <footer class="mt-8 text-center text-gray-500 italic text-xs">WORKOUT PLAN 2026</footer>

    <script>
        const absExercises = [
            "15 Medium Crunches", "15 Leg Raises", "30 Bicycles", 
            "Ankle Touch", "Planks", "Leg Cross"
        ];

        function buildAbs() {
            return absExercises.map((ex, i) => `
                <div class="card">
                    <div class="flex justify-between mb-3">
                        <b class="ex-name">${i+1}. ${ex}</b>
                        <button onclick="handleAction(this, true)" class="text-[10px] bg-blue-900 px-2 h-6 rounded uppercase">2m Rest</button>
                    </div>
                    <div class="flex gap-2">
                        <div class="set-btn" onclick="handleAction(this)">S1</div>
                        <div class="set-btn" onclick="handleAction(this)">S2</div>
                        <div class="set-btn" onclick="handleAction(this)">S3</div>
                    </div>
                </div>`).join('');
        }

        function initApp() {
            document.getElementById('day1').innerHTML = document.getElementById('pierna-template').innerHTML;
            document.getElementById('day4').innerHTML = document.getElementById('pierna-template').innerHTML;
            
            const heaContent = document.getElementById('hea-template').innerHTML;
            document.getElementById('day2').innerHTML = heaContent;
            document.getElementById('day5').innerHTML = heaContent;
            document.querySelectorAll('#abs-container').forEach(c => c.innerHTML = buildAbs());

            document.getElementById('day3').innerHTML = document.getElementById('pbt-template').innerHTML;
            document.getElementById('day6').innerHTML = document.getElementById('pbt-template').innerHTML;
        }

        function showDay(n) {
            document.querySelectorAll('.day-content').forEach(d => d.classList.remove('day-active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('day'+n).classList.add('day-active');
            document.getElementById('btn'+n).classList.add('nav-active');
            window.scrollTo(0,0);
        }

        let sTime, sInt, sessionActive = false;

        function handleAction(el, isTimer = false) {
            // Auto Check-in si no está activo
            if(!sessionActive) {
                const btn = document.getElementById('sessionBtn');
                if(btn.innerText === "CHECK-IN") toggleSession();
            }

            // Marcar botón
            el.classList.toggle('set-active');

            // Si es timer, lanzarlo
            if(isTimer) startTimer();
        }

        function toggleSession() {
            const btn = document.getElementById('sessionBtn');
            const timer = document.getElementById('sessionTimer');
            if(btn.innerText === "CHECK-IN") {
                sessionActive = true;
                sTime = new Date();
                btn.innerText = "CHECK-OUT";
                btn.classList.replace('bg-blue-600', 'bg-red-600');
                timer.classList.remove('hidden');
                sInt = setInterval(() => {
                    let d = new Date(new Date() - sTime);
                    timer.innerText = d.getUTCHours().toString().padStart(2,'0')+":"+d.getUTCMinutes().toString().padStart(2,'0')+":"+d.getUTCSeconds().toString().padStart(2,'0');
                }, 1000);
            } else {
                clearInterval(sInt);
                let summary = "RESUMEN DE PESOS:\n\n";
                document.querySelectorAll('.day-active .card').forEach(card => {
                    const name = card.querySelector('.ex-name');
                    const weight = card.querySelector('.weight-input');
                    if(name && weight && weight.value.trim() !== "") {
                        summary += `${name.innerText}: ${weight.value} lbs\n`;
                    }
                });
                alert(summary === "RESUMEN DE PESOS:\n\n" ? "Sesión terminada." : summary);
                location.reload();
            }
        }

        function startTimer() {
            let t = 120; // 2 minutos
            const display = document.getElementById('restTimerDisplay');
            const text = document.getElementById('tDisplay');
            display.classList.add('rest-active');
            
            clearInterval(window.timerInt);
            window.timerInt = setInterval(() => {
                t--;
                let m = Math.floor(t/60), s = t%60;
                text.innerText = `${m}:${s<10?'0':''}${s}`;
                if(t<=0) {
                    clearInterval(window.timerInt);
                    text.innerText = "LISTO";
                }
            }, 1000);
        }

        initApp();
    </script>
</body>
</html>
